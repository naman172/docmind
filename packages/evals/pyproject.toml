[project]
name = "docmind-evals"
version = "0.1.0"
description = "Project evals"
requires-python = ">=3.12"
dependencies = [
    "tabulate>=0.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docmind_evals"]

[dependency-groups]
dev = [
    "types-tabulate>=0.10.0.20260508",
]
