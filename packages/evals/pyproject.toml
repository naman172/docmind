[project]
name = "docmind-evals"
version = "0.1.0"
description = "Project evals"
requires-python = ">=3.12"
dependencies = [
    "docmind-core",
    "groq>=0.37.1",
    "langchain-community>=0.4.2",
    "langchain-google-vertexai>=3.2.4",
    "langchain-groq>=1.1.3",
    "langchain-ollama>=1.1.0",
    "ragas>=0.4.3",
    "tabulate>=0.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docmind_evals"]

[tool.uv.sources]
docmind-core = { workspace = true }
ragas = { git = "https://github.com/GoldSharon/ragas.git" }

[dependency-groups]
dev = [
    "types-tabulate>=0.10.0.20260508",
]
