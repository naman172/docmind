[project]
name = "docmind-core"
version = "0.1.0"
description = "Shared models, LLM client, and retriever logic"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docmind_core"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
