name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy .
      - name: Test
        run: uv run pytest
